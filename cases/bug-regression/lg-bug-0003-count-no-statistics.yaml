id: lg-bug-0003-count-no-statistics
title: ANALYZE 后 select count(*) 仍提示 "one or more columns ... do not have statistics"
category: bug_regression
status: open
severity: medium
destructive: false

source:
  feishu_anchor: "lightning-2.2-2.3-upgrade-regression"
  reported_at: "2025-12-01"
  fixed_version: ""
  ext_doc_url: ""
issue_url: https://code.hashdata.xyz/field-engineering/dev_collaboration/-/issues/641
tags: [optimizer, statistics, count]

description: |
  对表执行 ANALYZE 后，SELECT count(*) 仍然输出 "one or more columns in
  the following tables do not have statistics" 提示。本 case 用空表与
  10000 行两种规模分别验证 ANALYZE 之后 count(*) 都不应再出现该提示。
procedure: |
  1) DROP + CREATE 一张空 test001 (id bigint, name text) DISTRIBUTED BY (id)；
  2) ANALYZE test001（空表）；
  3) SELECT count(*) FROM test001：不应出现 "do not have statistics" 提示，
     count 应为 0；
  4) INSERT 10000 行（id + md5(random())），再 ANALYZE；
  5) 再次 SELECT count(*)：同样不应出现该提示，count 应为 10000。
expected: |
  - 两次 count(*) 查询的输出/NOTICE 流里都不含 "do not have statistics" 子串；
  - 空表查询 scalar = 0；populated 查询 scalar = 10000。

applies_to: {}
preconditions: {}
external_deps: []

defaults:
  database: postgres

setup:
  - DROP TABLE IF EXISTS test001

steps:
  - name: "空表 ANALYZE 后 count(*) 不应提示无统计"
    kind: sql
    sql: |
      CREATE TABLE IF NOT EXISTS test001 (id bigint, name text) DISTRIBUTED BY (id);
      ANALYZE test001;
      SELECT count(*) FROM test001
    expect:
      scalar: 0
      not_contains: "do not have statistics"

  - name: "INSERT 10000 行 + ANALYZE 后 count(*) 不应提示无统计"
    kind: sql
    sql: |
      INSERT INTO test001 SELECT id, md5(random()::text) FROM generate_series(1, 10000) id;
      ANALYZE test001;
      SELECT count(*) FROM test001
    expect:
      scalar: 10000
      not_contains: "do not have statistics"

teardown:
  - DROP TABLE IF EXISTS test001

created_by: chenqiang
created_at: "2026-05-23"
notes: |
  从 status:stub 升 status:open——飞书原文补齐了可执行 SQL（DDL +
  两段 ANALYZE/count(*) 子测试），不再需要 stub。

  "do not have statistics" 是 pg/Greenplum 的 NOTICE 级输出；runner 实跑
  时需要把 psycopg connection.notices 拼接进 step 输出流，让 expect
  not_contains 可以匹配——同 lg-bug-0002 的 NOTICE 捕获依赖。M1 runner
  实现 sql_driver 时统一处理。
