        ctx_gr_nm             varchar(500)   NOT NULL,
        evt_dtm               timestamp      NOT NULL,
        lot_gr_id             varchar(50)    NOT NULL,
        lot_id                varchar(200)   NOT NULL,
        mat_gr_id             varchar(50)    NOT NULL,
        mat_cd                varchar(50)    NOT NULL,
        seq_nvl               numeric(10)    NOT NULL,
        smry_tp_cd            varchar(50)    NULL,
        ae_rule_id_ctn        varchar(200)   NULL,
        ae_occr_dtm           timestamp      NULL,
        raw_data_srce_id_ctn  varchar(2000)  NULL,
        raw_data_ctn          varchar(4000)  NULL,
        ae_cart_ctn           varchar(200)   NULL,
        ae_rule_gr_id         varchar(50)    NULL,
        eqp_hld_yn            varchar(1)     NULL,
        lot_hld_yn            varchar(1)     NULL,
        sms_sndo_yn           varchar(1)     NULL,
        eml_sndo_yn           varchar(1)     NULL,
        tact_stat_cd          varchar(20)    NULL,
        tact_fin_ffil_user_id varchar(50)    NULL,
        tact_st_dtm           timestamp      NULL,
        tact_end_dtm          timestamp      NULL,
        fin_upd_dtm           timestamp      NULL,
        caus_cd               varchar(50)    NULL,
        caus_ctn              varchar(4000)  NULL,
        tact_cd               varchar(50)    NULL,
        tact_ctn              varchar(2000)  NULL,
        ncr_yn                varchar(1)     NULL,
        patn_area_id          varchar(50)    NULL,
        etl_ldup_dt           varchar(8)     NULL,
        data_ldup_dtm         timestamp      NULL,
        alm_id                text           NULL
    )
    USING ao_row WITH (compresstype=zstd,compresslevel=7)
    DISTRIBUTED RANDOMLY;

    drop TABLE if exists esko_mfg.tb_mspcb_spcp_ae_rule_n;
    CREATE TABLE esko_mfg.tb_mspcb_spcp_ae_rule_n (
        ae_rule_id        varchar(50)    NOT NULL,
        ae_rule_nm        varchar(200)   NULL,
        ae_rule_desc      varchar(1000)  NULL,
        use_yn            varchar(1)     NULL,
        fin_upd_user_id   varchar(50)    NULL,
        fin_upd_dtm       timestamp      NULL,
        user_def_yn       varchar(1)     NULL,
        r_fnc_use_yn      varchar(1)     NULL,
        rule_def_ctn      varchar(4000)  NULL,
        smpl_size         numeric(18, 5) NULL,
        hit_cnt           numeric(18)    NULL,
        val_tp_cd         varchar(50)    NULL,
        oprr_ctn          varchar(10)    NULL,
        lmtn_tp_cd_ctn    varchar(100)   NULL,
        main_apl_yn       varchar(1)     NULL,
