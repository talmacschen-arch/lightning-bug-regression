    )
    USING ao_row WITH (compresstype=zstd,compresslevel=7)
    DISTRIBUTED RANDOMLY;

    CREATE OR REPLACE FUNCTION common.f_empty_chk(column_text text)
      RETURNS text
      LANGUAGE plpgsql
      SECURITY DEFINER
    AS $function$
    DECLARE
        empth_chk_text TEXT;
    BEGIN
        SELECT case when column_text = '' then null else column_text end
          into empth_chk_text;
        RETURN empth_chk_text;
            EXCEPTION
                when others then
                    raise exception 'f_empty_chk ::: Exception => %', sqlstate;
    END;
    $function$;

    CREATE OR REPLACE FUNCTION common.f_get_name_2(lang_input text, column_text text)
      RETURNS text
      LANGUAGE plpgsql
      SECURITY DEFINER
    AS $function$
    DECLARE
        BASE_LANGUAGE TEXT := 'ko-KR';
        LANGUAGE_SELECTION TEXT;
        SPLIT_TEXT TEXT;
    BEGIN
        SELECT CASE WHEN LANG_INPUT IN ('ko-KR','zh-CN','en-US','pl-PL') THEN LANG_INPUT ELSE BASE_LANGUAGE END
          INTO LANGUAGE_SELECTION;
        SPLIT_TEXT := REPLACE(coalesce(common.f_empty_chk(SPLIT_PART(SPLIT_PART(SUBSTR(COLUMN_TEXT,POSITION(COALESCE(LANGUAGE_SELECTION,BASE_LANGUAGE) IN COLUMN_TEXT)
                        ,length(COLUMN_TEXT)),'|',1),COALESCE(LANGUAGE_SELECTION,BASE_LANGUAGE),2))
                            ,common.f_empty_chk(SPLIT_PART(SPLIT_PART(SUBSTR(COLUMN_TEXT,POSITION('en-US' IN COLUMN_TEXT),length(COLUMN_TEXT)),'|',1),'en-US',2))
                            ,common.f_empty_chk(SPLIT_PART(SPLIT_PART(SUBSTR(COLUMN_TEXT,POSITION('ko-KR' IN COLUMN_TEXT),length(COLUMN_TEXT)),'|',1),'ko-KR',2))
                            ,COLUMN_TEXT),'\','');
        RETURN SPLIT_TEXT;
            EXCEPTION
                when others then
                    raise exception 'F_GET_NAME ::: Exception => %', sqlstate;
    END;
    $function$;

    TRUNCATE TABLE esko_mfg.tb_mspcb_spcp_ae_rule_n;
    INSERT INTO esko_mfg.tb_mspcb_spcp_ae_rule_n (ae_rule_id, ae_rule_nm, ae_rule_desc)
