id: bug-0020-correlated-subquery-unnest-placeholdervar-wrong-result
title: 关联子查询用 UNNEST() 时 PG planner 误判 PlaceHolderVar 致结果错/报错（GP6/GP7.6 正确，GP7.5.x/SynxDB4.5 错）
category: bug_regression
status: open
severity: high
destructive: false

source:
  feishu_anchor: "wiki/YnuUw175SiggMXk8MoSc0Gqkned"
  reported_at: "2026-07-16"
  fixed_version: ""
  ext_doc_url: "https://hashdata.feishu.cn/wiki/YnuUw175SiggMXk8MoSc0Gqkned"
issue_url: ""
tags: [correlated-subquery, unnest, srf, placeholdervar, planner, orca, wrong-result, string_agg, locale, lc_collate]

description: |
  关联（correlated）子查询里用集合返回函数 UNNEST()（把外层列
  sh.ae_rule_id_ctn 逗号切分后 UNNEST，再 JOIN 规则表聚合 STRING_AGG）时，
  Postgres-based planner 对 PlaceHolderVar 处理有缺陷：未看进 wrapper 内部、
  误判子查询不依赖外层表 → 只对子查询求值一次、把这一个静态结果广播给外层
  每一行 → 查询结果错。

  Broadcom Root Cause（GP7 legacy Postgres planner bug，见飞书文档）：
    "correlated subqueries returned incorrect results due to improper handling
     of PlaceHolderVar"。GP6.33 正确、GP7.5.2~7.5.5 结果错、GP7.6.0+ 已修复。

  本 SQL 在 SynxDB4.5.1 上更严重——两种优化器都**直接报错**（尚未走到"结果
  错"这步）：
    - optimizer off（PG planner）: ERROR: correlated subquery with skip-level
      correlations is not supported                             （问题1）
    - optimizer on（ORCA）: ERROR: query plan with multiple segworker groups
      is not supported / CONTEXT: PL/pgSQL function common.f_get_name_2 （问题2）
  LG 客户环境（某 GUC 下）SynxDB4.5 能跑但结果错（与 GP7.5.x 一致）。（问题3）

  修复后（GP6/GP7.6+ 的正确行为）每行按各自 ae_rule_id_ctn 正确关联，6 行结果
  各不相同；BUG 时要么报错、要么 6 行 rule_ctrl 全是同一个被广播的值。
procedure: |
  1) setup: 建 LC_COLLATE/CTYPE='C' 的库（客户习惯，与飞书复现一致）+ schema
     esko_mfg / common + 主表 tb_mspcb_spcp_ae_cmn_h（6 行）+ 规则表
     tb_mspcb_spcp_ae_rule_n（4 条 R_01~R_04，故意不建 R_04 里引用的 R_99）+
     两个 plpgsql 函数 f_empty_chk / f_get_name_2；
  2) assert-pg-planner-correct-result（核心，对应修复优先级"优先修复 pg 优化器"）:
     optimizer off 跑原查询，期望**正确的每行结果**——输出含 "Calibration Error"
     / "Sensor Offline" / "Overheating,Overheating"（这三个值只在每行各自正确
     关联时出现），且不含报错文案；
  3) assert-orca-correct-result: optimizer on 跑同一查询，同样期望正确每行结果。
expected: |
  - 两个断言步 psql 退出 0，输出含 "Calibration Error" / "Sensor Offline" /
    "Overheating,Overheating" / "(6 rows)"，且不含 "ERROR" / "skip-level
    correlations" / "multiple segworker groups"（= 修复后每行正确关联的行为）；
  - BUG 复现时：要么直接报错（SynxDB4.5.1 现状，问题1/2）→ 三个鉴别值缺失 +
    报错文案出现 → 红；要么返回广播的错误结果（GP7.5.x/问题3，rule_ctrl 每行
    都是 "Overheating,R_02"）→ 三个鉴别值仍缺失 → 红。

applies_to: {}
preconditions: {}
external_deps: []

defaults:
  database: gpadmin

sessions:                # 两步放独立 session → 独立分组 → 各自都跑、各自都报告；
  pg: {driver: shell}    # 否则同组「首个非 pass 即 break」会在 step1(PG) 失败时
  orca: {driver: shell}  # 跳过 step2(ORCA)，只看到一条。两步都是只读 SELECT、
                         # 各开独立 psql 连接，并发无冲突（driver: shell = 不建 SQL 连接）。

setup:
  # CREATE/DROP DATABASE 是 non-tx-safe DDL，走 psql -c（design.md §4.1.2，与
  # bug-0005/0019 同款）。独占库 bug0020_lgdb（客户复现用 lgdb；库名与 BUG 无关，
  # 触发条件是关联子查询 + UNNEST + PlaceHolderVar；独占命名避免撞集群里已存在、
  # 有常驻会话的 lgdb 导致 DROP 失败 + 满足 setup 幂等）。LC_COLLATE/CTYPE='C'
  # 与飞书复现一致（客户习惯 C 字符集；不指定 ENCODING，template0 下实测 UTF8）。
  - su - gpadmin -c "psql -d gpadmin -c 'DROP DATABASE IF EXISTS bug0020_lgdb'"
  - su - gpadmin -c "psql -d gpadmin -c \"CREATE DATABASE bug0020_lgdb TEMPLATE template0 LC_COLLATE 'C' LC_CTYPE 'C'\""
  # schema / 表 / 函数 / 数据一次性灌进新库（psql -f - heredoc，ON_ERROR_STOP=1
  # 任一条失败即中止并给清晰 psql 报错行）。表 SQL 与飞书复现原样一致（ao_row +
  # zstd + DISTRIBUTED RANDOMLY）。规则表只建 R_01~R_04，故意不建 R_99（复现
  # "R_04,R_99 只关联到 R_04"）。
  - |
    su - gpadmin -c 'psql -d bug0020_lgdb -v ON_ERROR_STOP=1 -f -' <<'SQL'
    create schema if not exists esko_mfg;
    create schema if not exists common;

    drop table if exists esko_mfg.tb_mspcb_spcp_ae_cmn_h;
    CREATE TABLE esko_mfg.tb_mspcb_spcp_ae_cmn_h (
        pldo_cd               varchar(20)    NOT NULL,
        proc_id               varchar(50)    NOT NULL,
        ftr_id                varchar(300)   NOT NULL,
