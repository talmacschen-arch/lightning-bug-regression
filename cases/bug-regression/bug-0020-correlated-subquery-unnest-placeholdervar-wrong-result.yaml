    TRUNCATE TABLE esko_mfg.tb_mspcb_spcp_ae_cmn_h;
    INSERT INTO esko_mfg.tb_mspcb_spcp_ae_cmn_h
        (pldo_cd, proc_id, ftr_id, eqp_id, ctx_gr_nm, evt_dtm,
         lot_gr_id, lot_id, mat_gr_id, mat_cd, seq_nvl,
         ae_rule_id_ctn, ae_occr_dtm)
    VALUES
        ('PL01','P01','F01','EQP01','CTX01','2026-06-10 08:59:49','LG01','LOT01','MG01','MAT01',1,'R_01,R_02','2026-06-10 08:59:49'),
        ('PL01','P01','F01','EQP01','CTX01','2026-06-10 08:59:50','LG01','LOT01','MG01','MAT01',2,'R_03',      '2026-06-10 08:59:50'),
        ('PL01','P01','F01','EQP01','CTX01','2026-06-10 08:59:51','LG01','LOT01','MG01','MAT01',3,'',          '2026-06-10 08:59:51'),
        ('PL01','P01','F01','EQP01','CTX01','2026-06-10 08:59:52','LG01','LOT01','MG01','MAT01',4,'R_04,R_99', '2026-06-10 08:59:52'),
        ('PL01','P01','F01','EQP01','CTX01','2026-06-10 08:59:53','LG01','LOT01','MG01','MAT01',5,'R_01,R_01', '2026-06-10 08:59:53'),
        ('PL01','P01','F01','EQP01','CTX01','2026-06-10 08:59:54','LG01','LOT01','MG01','MAT01',6,'',          '2026-06-10 08:59:54');
    SQL

steps:
  - name: "assert-pg-planner-correct-result（核心）: optimizer off 关联子查询+UNNEST 每行结果应正确"
    kind: shell
    "on": pg               # 必须给 key 加引号：YAML 1.1 裸 on 会被解析成布尔 true
    cmd: |
      su - gpadmin -c 'psql -d bug0020_lgdb -v ON_ERROR_STOP=1 -f -' 2>&1 <<'SQL'
      set optimizer to off;
      SELECT ae_rule_id_ctn
          , ( SELECT STRING_AGG(rul_nm ,',' ORDER BY ae_rule_id)
              FROM ( SELECT COALESCE(ae_rule_nm, ae_rule_id) AS rul_nm, ae_rule_id
                     FROM esko_mfg.tb_mspcb_spcp_ae_rule_n t1
                     JOIN ( SELECT UNNEST(string_to_array(sh.ae_rule_id_ctn,',')) ) t2(column2)
                       ON t1.ae_rule_id = t2.column2 ) t
            ) AS rule_ctrl
          , ( SELECT STRING_AGG(rul_desc ,',' ORDER BY ae_rule_id)
              FROM ( SELECT COALESCE(
                            common.f_get_name_2('ko-K0R', t1.ae_rule_desc), ae_rule_id) AS rul_desc
                          , ae_rule_id
                     FROM esko_mfg.tb_mspcb_spcp_ae_rule_n t1
                     join (select UNNEST(string_to_array(sh.ae_rule_id_ctn,',')) ) t2(column2)
                     on t1.ae_rule_id = t2.column2 ) t
            ) AS specOutRuleDescListName
      FROM esko_mfg.tb_mspcb_spcp_ae_cmn_h sh
      WHERE 1=1
        AND sh.ae_occr_dtm >= '2026-06-10 06:00:00'
        AND sh.ae_occr_dtm < '2026-06-11 06:00:00'
        AND sh.evt_dtm BETWEEN '2026-06-10 06:00:00'::TIMESTAMP - INTERVAL '1 DAYS'
                           AND '2026-06-11 06:00:00'::TIMESTAMP + INTERVAL '1 DAYS'
      ORDER BY pldo_cd, proc_id, ftr_id, eqp_id, ctx_gr_nm, evt_dtm
             , lot_gr_id, lot_id, mat_gr_id, mat_cd, seq_nvl
             , ae_rule_id_ctn;
      SQL
    timeout_sec: 120
    expect:
      exit_code: 0
      stdout_contains:
        - "Calibration Error"
        - "Sensor Offline"
        - "Overheating,Overheating"
        - "(6 rows)"
      not_contains:
        - "ERROR"
        - "skip-level correlations"
        - "multiple segworker groups"

  - name: "assert-orca-correct-result: optimizer on 关联子查询+UNNEST 每行结果应正确"
    kind: shell
    "on": orca             # 同上，key 加引号避免被当布尔
    cmd: |
      su - gpadmin -c 'psql -d bug0020_lgdb -v ON_ERROR_STOP=1 -f -' 2>&1 <<'SQL'
      set optimizer to on;
      SELECT ae_rule_id_ctn
          , ( SELECT STRING_AGG(rul_nm ,',' ORDER BY ae_rule_id)
              FROM ( SELECT COALESCE(ae_rule_nm, ae_rule_id) AS rul_nm, ae_rule_id
                     FROM esko_mfg.tb_mspcb_spcp_ae_rule_n t1
                     JOIN ( SELECT UNNEST(string_to_array(sh.ae_rule_id_ctn,',')) ) t2(column2)
                       ON t1.ae_rule_id = t2.column2 ) t
            ) AS rule_ctrl
          , ( SELECT STRING_AGG(rul_desc ,',' ORDER BY ae_rule_id)
              FROM ( SELECT COALESCE(
                            common.f_get_name_2('ko-K0R', t1.ae_rule_desc), ae_rule_id) AS rul_desc
                          , ae_rule_id
                     FROM esko_mfg.tb_mspcb_spcp_ae_rule_n t1
                     join (select UNNEST(string_to_array(sh.ae_rule_id_ctn,',')) ) t2(column2)
                     on t1.ae_rule_id = t2.column2 ) t
            ) AS specOutRuleDescListName
      FROM esko_mfg.tb_mspcb_spcp_ae_cmn_h sh
      WHERE 1=1
        AND sh.ae_occr_dtm >= '2026-06-10 06:00:00'
        AND sh.ae_occr_dtm < '2026-06-11 06:00:00'
        AND sh.evt_dtm BETWEEN '2026-06-10 06:00:00'::TIMESTAMP - INTERVAL '1 DAYS'
                           AND '2026-06-11 06:00:00'::TIMESTAMP + INTERVAL '1 DAYS'
      ORDER BY pldo_cd, proc_id, ftr_id, eqp_id, ctx_gr_nm, evt_dtm
             , lot_gr_id, lot_id, mat_gr_id, mat_cd, seq_nvl
             , ae_rule_id_ctn;
      SQL
    timeout_sec: 120
    expect:
      exit_code: 0
      stdout_contains:
        - "Calibration Error"
        - "Sensor Offline"
        - "Overheating,Overheating"
        - "(6 rows)"
      not_contains:
        - "ERROR"
        - "skip-level correlations"
        - "multiple segworker groups"

teardown:
  - su - gpadmin -c "psql -d gpadmin -c 'DROP DATABASE IF EXISTS bug0020_lgdb'"

created_by: chenqiang
created_at: "2026-07-16"
notes: |
  来源：飞书 wiki/YnuUw175SiggMXk8MoSc0Gqkned（LG 客户，2026-07；含 Broadcom SR
  Root Cause，注意保密）。SQL / 表结构 / 函数 / 造数均按飞书复现原样内联。

  **判定信号 = rule_ctrl 列的每行鉴别值（关键，且与函数版本无关）**：
  鉴别值 "Calibration Error"（R_03 行）/ "Sensor Offline"（R_04,R_99 行）/
  "Overheating,Overheating"（R_01,R_01 行）都来自第 2 列 rule_ctrl =
  COALESCE(ae_rule_nm, ae_rule_id)，**不经过 f_get_name_2 函数**，因此不受函数
  实现/版本影响（飞书里客户实际函数输出 "[ko-KR] Translated:" 与本文档给的函数
  版本不同，只影响第 3 列 specOutRuleDescListName，不影响这三个鉴别值）。
  这三个值**只在每行按各自 ae_rule_id_ctn 正确关联**时才出现；BUG 两种表现都不
  出现它们：
    - SynxDB4.5.1 现状：直接报错（问题1/2），根本没有结果行；
    - GP7.5.x/问题3：子查询被广播，6 行 rule_ctrl 全是 "Overheating,R_02"
      （第 1 行的值），故 "Calibration Error"/"Sensor Offline"/
      "Overheating,Overheating" 全缺失。
  → stdout_contains 全含判正确、not_contains 判无报错，双向卡死。

  **not_contains "ERROR" 安全**：大小写敏感子串匹配，"Calibration Error"（Error）
  不会命中 "ERROR"（psql 报错前缀 "ERROR:" 全大写）。

  **为何配 2>&1**：shell_driver 分开捕获 stdout/stderr（create_subprocess_shell），
  断言只读 stdout（orchestrator.py:203-205）；cmd 末尾 2>&1 把 psql 打在 stderr 的
  报错文案并进 stdout，not_contains 才能匹配到，与 exit_code 形成多重信号。

  **为何走 kind: shell + psql -f - heredoc**：set optimizer 与 SELECT 必须同会话；
  两个断言步各自一次 psql 连接跑完 set+select，等价客户交互式复现。CREATE/DROP
  DATABASE 是 non-tx-safe 走 psql -c；对象+数据用一条 psql -f - heredoc 灌进新库
  （ON_ERROR_STOP=1）。

  **两步都 gate + 独立 session（编排取舍）**：飞书把 问题1(PG 报错)/问题2(ORCA 报错)/
  问题3(结果错) 列为同一 bug 的三层，最终目标是两种 optimizer 都返回正确结果，故编成
  两个断言步都要求正确结果，作为"完整修复"守卫。修复计划是"优先修复 pg 优化器"，故
  step1(optimizer off) 为核心；任一步失败 → case 红。

  **为何两步放独立 session（sessions: {pg,orca} + "on":）**：若同属一个 session 组，
  orchestrator「同组内首个非 pass 即 break 后续」（orchestrator.py:22/455-490）会在
  step1(PG) 失败时**跳过 step2(ORCA)、只显示一条**——问题2(ORCA 报错) 就看不到了。
  放到独立 session → 两步各自独立分组、并发跑、各自独立报告（实测 build 360 上两步
  都跑出 fail：step1=skip-level correlations、step2=multiple segworker groups）。两步
  都是只读 SELECT、各开独立 psql 连接、各自 set 自己的 optimizer，并发无冲突；session
  config 写 driver: shell 表示不建 SQL 连接（SqlSessionPool.acquire 惰性，shell step
  从不调它）。**注意 YAML 1.1 坑**：step 里的 on key 必须写成带引号的 "on"，否则裸 on
  会被 PyYAML 解析成布尔 true、丢失分组（曾踩：两步又落回同一默认组）。

  Broadcom 定位的 Root Cause（PlaceHolderVar）在 Postgres-based planner，ORCA 的
  "multiple segworker groups" 是另一路径（SECURITY DEFINER 函数在子查询里读分布表），
  二者是否同批修好未定，届时按实际行为可拆分/调整本 case。

  **判定语义**（design.md §4.1.1：正面 expect = 修复后行为，红 = 仍有此 BUG）：
  2026-07-16 在 SynxDB4.5.1 build 360 上实测两种 optimizer **均直接报错**（问题1/2
  文案与飞书一致）→ 本 case 判红 = BUG 仍在。正确基线为飞书 GP6.33 输出（6 行各
  不相同）。待在含修复的 build（对标 GP7.6.0+）上验证行为后，若已修复再 flip 到
  fixed 并回填 source.fixed_version（+ 证据链）。

  **库名/清理**：独占库 bug0020_lgdb（非客户的 lgdb），避免撞常驻会话导致 DROP
  失败 + 满足 setup 幂等；断言步是一次性 psql -f -（跑完即断开），teardown 时无
  驻留连接，可干净 DROP。
