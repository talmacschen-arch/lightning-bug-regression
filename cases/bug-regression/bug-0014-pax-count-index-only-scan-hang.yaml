id: bug-0014-pax-count-index-only-scan-hang
title: 9.15 PAX 表 enable_seqscan(off)+ORCA(off) 下 count(*) 走 Index Only Scan 时 hang 住
category: bug_regression
status: open
severity: high
destructive: false

source:
  feishu_anchor: "section-9.15-pax-count-index-only-scan-hang"
  reported_at: "2026-06-27"
  fixed_version: ""
  ext_doc_url: ""
issue_url: https://code.hashdata.xyz/field-engineering/dev_collaboration/-/issues/826
tags: [pax, ao_row, count, index_only_scan, orca, enable_seqscan, hang, planner]

description: |
  飞书 §9.15《(open)PAX 表在 enable_seqscan(off) 及 ORCA(off) 后 count(*) 查询
  PAX 表走 Index Only Scan 时 hang 住》(issue #826)：
  USING PAX (zstd 压缩) 的表，建一个 btree 索引。当
  `SET enable_seqscan=off` + `SET optimizer=off`（Postgres planner）后，
  `SELECT count(*)` 的执行计划被规划成 **Index Only Scan**，实际执行时**永久
  hang 住、不返回**。

  **对照（飞书原文 Test1 vs Test2）**：同样建一张 schema 完全相同的 AO_ROW 表
  (appendonly=true, orientation=row) + 同样的 btree 索引，在**完全相同**的
  `enable_seqscan=off`+`optimizer=off` 条件下，AO_ROW 表走 **Bitmap Heap Scan**
  （不是 Index Only Scan）并**正常秒回**——证明问题只在 PAX 存储、与 GUC 组合
  本身无关。临时绕行：`SET enable_indexonlyscan=off`（飞书原文给出的 workaround）。
  彻底修复方案：MR !1190「彻底关闭 pax-index-only-scan」【待升级修复】。

  本 case 核心断言抓「PAX 在 IOS 路径下 count(*) 应正常返回行数」——BUG 存在时
  该查询 hang 住，靠 `statement_timeout` 取消后 stdout 拿不到行数 → 断言失败 →
  看板红 = 仍有此 BUG；AO_ROW 对照步在同条件下应正常返回（PASS），坐实问题专属 PAX。

procedure: |
  1) prep-create-pax: 建 schema + PAX(zstd) 表（eqp_id/virt_cell_id 复合分布键 +
     atul_cell_id 索引列；列裁剪自飞书 11 列原表，保留触发 BUG 的最小集）
  2) prep-insert-pax: PAX 表灌 5,000,000 行（本机实测 hang 阈值约 1.2M，取 5M 留余量）
  3) prep-index-analyze-pax: PAX 表 atul_cell_id 建 btree 索引 + ANALYZE（独立
     psql -c，ANALYZE 非事务安全 DDL 不可被 psycopg autocommit 包裹）
  4) prep-create-ao: 建 AO_ROW 对照表 _bk（appendonly+row，schema 与 PAX 表一致）
  5) prep-insert-ao: AO_ROW 表灌同样 5,000,000 行
  6) prep-index-analyze-ao: AO_ROW 表同样 atul_cell_id 建 btree 索引 + ANALYZE
  7) diag-plan-pax（诊断，证明走到 BUG 路径）: enable_seqscan=off + optimizer=off 下
     EXPLAIN PAX count(*)，断言计划含 "Index Only Scan" —— 证明 count(*) 确实被
     规划成出问题的 IOS 计划（wiring 证据）
  8) diag-plan-ao（诊断，证明对照走不同计划）: 同条件 EXPLAIN AO_ROW count(*)，
     断言计划含 "Bitmap Heap Scan" —— 证明 AO_ROW 走 Bitmap 而非 IOS
  9) ctrl-ao-row-ok（对照断言）: 同条件 AO_ROW count(*) 应秒回 5000000 ——
     证明同样的 GUC 组合在 AO_ROW 上不 hang，问题专属 PAX 存储（build130 应 PASS）
  10) diag-workaround（诊断/正面对照）: PAX 表同条件再叠加 enable_indexonlyscan=off，
     count(*) 应秒回 5000000 —— 证明 PAX 数据与计数本身没问题、只有 IOS 路径会 hang
  11) assert-no-hang（核心断言）: PAX 表 enable_seqscan=off + optimizer=off（IOS 路径），
     带 statement_timeout=30s 跑 count(*)，期望 stdout 含 "5000000"。
     BUG 存在时 hang → statement_timeout 取消 → stdout 无行数 → 断言失败 → 红。
  12) teardown: DROP SCHEMA

expected: |
  - diag-plan-pax: EXPLAIN 计划含 "Index Only Scan"（确认 PAX 走到 BUG 路径）
  - diag-plan-ao: EXPLAIN 计划含 "Bitmap Heap Scan"（确认 AO_ROW 走不同计划）
  - ctrl-ao-row-ok: AO_ROW count(*) 返回 5000000（对照：同条件 AO_ROW 不 hang）
  - diag-workaround: PAX enable_indexonlyscan=off 后 count(*) 返回 5000000（数据正常）
  - **核心：assert-no-hang PAX count(*) 返回 5000000**（修复后行为；BUG 复现时查询
    hang 住被 statement_timeout 取消，stdout 拿不到 5000000 → 断言失败 → 红）

applies_to: {}
preconditions: {}
external_deps: []

defaults:
  database: gpadmin

sessions: []

setup:
  - su - gpadmin -c "psql -d gpadmin -c 'DROP SCHEMA IF EXISTS lbr_bug0014 CASCADE'"

steps:
  - name: "prep-create-pax: schema + PAX(zstd) 表"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -v ON_ERROR_STOP=1 -f -" <<'EOSQL'
      CREATE SCHEMA IF NOT EXISTS lbr_bug0014;
      CREATE TABLE lbr_bug0014.pax_iohs (
        eqp_id       text NOT NULL,
        virt_cell_id text NOT NULL,
        atul_cell_id text
      ) USING PAX
      WITH (compresstype=zstd, compresslevel=7)
      DISTRIBUTED BY (eqp_id, virt_cell_id);
      EOSQL
    timeout_ms: 60000
    expect:
      exit_code: 0

  - name: "prep-insert-pax: PAX 表灌 5,000,000 行（hang 阈值~1.2M，取 5M 留余量）"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -v ON_ERROR_STOP=1 -f -" <<'EOSQL'
      INSERT INTO lbr_bug0014.pax_iohs
      SELECT 'EQP_'||(g%100)::text,
             'VIRT_'||g::text,
             'ATUL_'||(g%50000000)::text
      FROM generate_series(1, 5000000) g;
      EOSQL
    timeout_ms: 300000
    expect:
      exit_code: 0

  - name: "prep-index-analyze-pax: PAX 表 atul_cell_id 建 btree 索引 + ANALYZE"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -v ON_ERROR_STOP=1 -f -" <<'EOSQL'
      CREATE INDEX pax_iohs_idx2 ON lbr_bug0014.pax_iohs USING btree (atul_cell_id);
      ANALYZE lbr_bug0014.pax_iohs;
      EOSQL
    timeout_ms: 300000
    expect:
      exit_code: 0

  - name: "prep-create-ao: AO_ROW 对照表 _bk（appendonly+row，schema 同 PAX 表）"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -v ON_ERROR_STOP=1 -f -" <<'EOSQL'
      CREATE TABLE lbr_bug0014.pax_iohs_bk (
        eqp_id       text NOT NULL,
        virt_cell_id text NOT NULL,
        atul_cell_id text
      ) WITH (appendonly=true, orientation=row, compresstype=zstd, compresslevel=7)
      DISTRIBUTED BY (eqp_id, virt_cell_id);
      EOSQL
    timeout_ms: 60000
    expect:
      exit_code: 0

  - name: "prep-insert-ao: AO_ROW 表灌同样 5,000,000 行"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -v ON_ERROR_STOP=1 -f -" <<'EOSQL'
      INSERT INTO lbr_bug0014.pax_iohs_bk
      SELECT 'EQP_'||(g%100)::text,
             'VIRT_'||g::text,
             'ATUL_'||(g%50000000)::text
      FROM generate_series(1, 5000000) g;
      EOSQL
    timeout_ms: 300000
    expect:
      exit_code: 0

  - name: "prep-index-analyze-ao: AO_ROW 表同样 atul_cell_id 建 btree 索引 + ANALYZE"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -v ON_ERROR_STOP=1 -f -" <<'EOSQL'
      CREATE INDEX pax_iohs_bk_idx2 ON lbr_bug0014.pax_iohs_bk USING btree (atul_cell_id);
      ANALYZE lbr_bug0014.pax_iohs_bk;
      EOSQL
    timeout_ms: 300000
    expect:
      exit_code: 0

  - name: "diag-plan-pax: 证明 PAX count(*) 走 Index Only Scan（BUG 路径 wiring 证据）"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -c \"SET enable_seqscan=off; SET optimizer=off; EXPLAIN SELECT count(*) FROM lbr_bug0014.pax_iohs;\""
    timeout_ms: 60000
    expect:
      stdout_contains: "Index Only Scan"

  - name: "diag-plan-ao: 证明 AO_ROW count(*) 走 Bitmap Heap Scan（对照走不同计划）"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -c \"SET enable_seqscan=off; SET optimizer=off; EXPLAIN SELECT count(*) FROM lbr_bug0014.pax_iohs_bk;\""
    timeout_ms: 60000
    expect:
      stdout_contains: "Bitmap Heap Scan"

  - name: "ctrl-ao-row-ok（对照断言）: 同条件 AO_ROW count(*) 应秒回 5000000（问题专属 PAX）"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -c \"SET enable_seqscan=off; SET optimizer=off; SET statement_timeout=30000; SELECT count(*) FROM lbr_bug0014.pax_iohs_bk;\""
    timeout_ms: 60000
    expect:
      stdout_contains: "5000000"

  - name: "diag-workaround: PAX 表 enable_indexonlyscan=off 后 count(*) 秒回 5000000（数据正常对照）"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -c \"SET enable_seqscan=off; SET optimizer=off; SET enable_indexonlyscan=off; SET statement_timeout=30000; SELECT count(*) FROM lbr_bug0014.pax_iohs;\""
    timeout_ms: 60000
    expect:
      stdout_contains: "5000000"

  - name: "assert-no-hang（核心断言）: PAX IOS 路径 count(*) 应返回 5000000（BUG 时 hang→timeout→无行数→红）"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -c \"SET enable_seqscan=off; SET optimizer=off; SET statement_timeout=30000; SELECT count(*) FROM lbr_bug0014.pax_iohs;\""
    timeout_ms: 60000
    expect:
      stdout_contains: "5000000"

teardown:
  - su - gpadmin -c "psql -d gpadmin -c 'DROP SCHEMA IF EXISTS lbr_bug0014 CASCADE'"

created_by: chenqiang
created_at: "2026-06-27"
notes: |
  来源：飞书 wiki §9.15《(open)PAX 表在 enable_seqscan(off) 及 ORCA(off) 后
  count(*) 查询 PAX 表走 Index Only Scan 时 hang 住》
  https://hashdata.feishu.cn/wiki/YFNBwylMHirlzSkCFGscwhCBn9e
  issue #826: https://code.hashdata.xyz/field-engineering/dev_collaboration/-/issues/826
  修复 MR !1190（彻底关闭 pax-index-only-scan）【待升级修复】。

  **BUG（核心，确定性）**：PAX(zstd) 表 + btree 索引，`enable_seqscan=off` +
  `optimizer=off` 时 `SELECT count(*)` 被 Postgres planner 规划成 Index Only
  Scan，执行时永久 hang。`enable_indexonlyscan=off` 可绕行（秒回）。

  **对照组 AO_ROW（飞书原文 Test1 vs Test2 的核心论点）**：schema 完全相同的
  AO_ROW 表 (appendonly=true, orientation=row) + 同样 btree 索引，在**完全相同**
  的 enable_seqscan=off + optimizer=off 下走 **Bitmap Heap Scan**（不是 Index
  Only Scan）并秒回。这证明该 hang **不是** GUC 组合本身的问题，而是 PAX 存储在
  IOS 路径上的缺陷。本 case 用 ctrl-ao-row-ok + diag-plan-ao 两步坐实这一对照：
  AO_ROW 计划走 Bitmap、count(*) 正常返回（build130 应 PASS），与 PAX 的
  assert-no-hang（FAIL）形成鲜明对比。

  **判定语义**（design.md §4.1.1：正面期望=修复后行为，红=仍有此 BUG）：
  核心断言 assert-no-hang 期望 PAX count(*) 返回 5000000。build130 实测该查询
  hang，靠 `statement_timeout=30000` 服务端取消（实测能干净取消、无残留 backend），
  取消后 stdout 拿不到 "5000000" → 断言失败 → case 红 = BUG 复现。故 status=open。
  对照步 ctrl-ao-row-ok 在 build130 应 PASS（AO_ROW 无此问题）；它**不**改变 case
  红/绿（case 因 PAX 核心断言失败而红），只是把「问题专属 PAX」写进证据。

  **为何用 shell + statement_timeout 而非 kind:sql**：
  - 每个 step 用独立 `psql -c`（fresh 会话），彻底避免 GUC 跨 step 串味
    （diag-workaround 的 enable_indexonlyscan=off 不会污染核心断言步）；
  - hang 的检测交给确定性的 `statement_timeout`（服务端取消），而非靠模型/外层
    超时判断；本机实测 statement_timeout 能对该 hang 干净取消、连接可复用、
    不留 runaway backend。stdout_contains "5000000" 既验「不 hang」又验「计数正确」。

  **本机验证（2026-06-27, SynxDB 4.5.0 build130）**：手工逐条复现确认——
  - 5M 行 PAX 表，enable_seqscan=off+optimizer=off 下 EXPLAIN 计划确为
    `Index Only Scan using pax_iohs_idx2`；该 count(*) 在 statement_timeout 30s
    下被取消、从不返回（hang）；
  - 同 schema 的 5M 行 AO_ROW 表，同条件下 EXPLAIN 走 `Bitmap Heap Scan on
    pax_iohs_bk`（+ Bitmap Index Scan），count(*) 0.16s 返回 5000000；
  - PAX 叠加 enable_indexonlyscan=off 后秒回 5000000；默认（seqscan on）亦秒回
    5000000 → 证明数据与计数正确，只有 PAX 的 IOS 路径 hang；
  - 核心断言 assert-no-hang 在 build130 预期为 FAIL（BUG 未修复），ctrl-ao-row-ok
    与全部 diag 步预期 PASS。

  **数据规模（实测阈值）**：本机 8 段集群上 100K/300K/500K/1M 行**不** hang（IOS
  仍被选中但秒回）；1.5M 行起 hang，阈值约总行数 1.2M（每段 ~150K）。本 case
  取 5,000,000 行留充足余量，远小于飞书原文 ~178M 行（17888228×10），prep 仍秒级。

  **列裁剪**：飞书原表 11 列 + AO_ROW `_bk` 对照表 + 临时生成器表。本 case 保留
  PAX + AO_ROW 双表对照（飞书论点核心），但两表都裁到触发/对照所需的最小集：
  3 列（复合分布键 eqp_id/virt_cell_id + 索引列 atul_cell_id），直接 generate_series
  灌数，不建临时生成器表。
