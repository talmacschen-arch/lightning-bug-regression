id: lg-bug-0010-gplogfilter-stuck-or-error
title: 9.9 gplogfilter 处理大日志文件长时间卡住或报错
category: bug_regression
status: open
severity: medium
destructive: false

source:
  feishu_anchor: "section-9.9-gplogfilter-stuck-or-error"
  reported_at: "2026-04-16"
  fixed_version: ""
  ext_doc_url: ""
issue_url: https://code.hashdata.xyz/field-engineering/dev_collaboration/-/issues/733
tags: [gplogfilter, log_analysis, performance, python_buffer, gppylib]

description: |
  验证 gplogfilter 处理大 gpdb csv 日志时不卡住不报错。
procedure: |
  1) cd $COORDINATOR_DATA_DIRECTORY/log/
  2) 取最大 gpdb*.csv
  3) gplogfilter -f interconnect <file>
expected: |
  - exit 0
  - stdout 含 "log entries"
  - 不含 Traceback / ERROR: / NO_GPDB_LOG_FOUND

applies_to: {}
preconditions: {}
external_deps: []

defaults:
  database: gpadmin

sessions: []

setup: []

steps:
  - name: "找最大 gpdb csv 日志并跑 gplogfilter -f interconnect"
    kind: shell
    cmd: |
      su - gpadmin -c "
        cd \$COORDINATOR_DATA_DIRECTORY/log/ || exit 2
        LOG_FILE=\$(ls -1S gpdb*.csv 2>/dev/null | head -1)
        if [ -z \"\$LOG_FILE\" ]; then
          echo 'NO_GPDB_LOG_FOUND_IN_COORDINATOR_LOG_DIR'
          exit 3
        fi
        SIZE_HUMAN=\$(du -h \"\$LOG_FILE\" | awk '{print \$1}')
        echo \"selected_log: \$LOG_FILE size=\$SIZE_HUMAN\"
        gplogfilter -f interconnect \"\$LOG_FILE\" 2>&1
      "
    timeout_sec: 300
    expect:
      exit_code: 0
      stdout_contains: ["log entries"]
      not_contains: ["Traceback", "ERROR:", "unhandled exception", "NO_GPDB_LOG_FOUND"]

teardown: []

created_by: chenqiang
created_at: "2026-05-25"
notes: |
  来源：飞书 §9.9 + issue #733。
  Try-PASS verified 2026-05-25.
