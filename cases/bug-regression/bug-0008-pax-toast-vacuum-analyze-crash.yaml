id: bug-0008-pax-toast-vacuum-analyze-crash
title: PAX 表含 TOAST 大数组与 NULL 行时 VACUUM FULL + ANALYZE 触发数据库 crash
category: bug_regression
status: fixed
severity: high
destructive: false

source:
  feishu_anchor: "section-9.11-pax-toast-vacuum-analyze-crash"
  reported_at: "2026-05-24"
  fixed_version: "SynxDB-4.5.0-build130"
  ext_doc_url: ""
issue_url: https://code.hashdata.xyz/field-engineering/dev_collaboration/-/issues/774
tags: [pax, toast, vacuum, analyze, crash]

description: |
  PAX + DISTRIBUTED REPLICATED 表里有 1 行 NULL + 1 行需要走 TOAST 外部存储的
  大数组（≈10M 元素），顺序跑 VACUUM FULL 然后 ANALYZE，飞书原文记录会触发
  集群 crash（recover mode）。本 case 验证 fix 后不再 crash。
procedure: |
  1) setup: DROP + CREATE PAX REPLICATED 表（kind: sql 走 psycopg）
  2) 主 step: SET pax.enable_toast = on; INSERT 1 NULL 行 + 1 行 10M ARRAY
     （kind: sql；sql_driver 末尾 conn.commit() 保证后续 shell step 可见）
  3) 主 step: psql -c 'VACUUM FULL toast_bug_array'（kind: shell，独立连接）
  4) 主 step: psql -c 'ANALYZE toast_bug_array'（kind: shell，独立连接）
  5) teardown: DROP TABLE 收尾
expected: |
  - 主 step 2 INSERT 退出 0、未报错；
  - 主 step 3/4 psql -c 退出 0，stderr 不含 ERROR / FATAL / server closed；
  - 集群不 crash（无 recover mode）。

applies_to: {}
preconditions: {}
external_deps: []

defaults:
  database: gpadmin

setup:
  - DROP TABLE IF EXISTS toast_bug_array
  - |
    CREATE TABLE toast_bug_array (
      id   INT,
      data TEXT[]
    ) USING PAX DISTRIBUTED REPLICATED

steps:
  - name: "SET pax.enable_toast + INSERT 1 NULL + 1 大数组 (10M elements)"
    kind: sql
    sql: |
      SET pax.enable_toast = on;
      INSERT INTO toast_bug_array VALUES
        (1, NULL),
        (2, ARRAY(SELECT 'element_' || generate_series(1, 10000000)));
    timeout_sec: 600
    expect:
      not_contains: ["ERROR", "FATAL", "server closed the connection"]

  - name: "VACUUM FULL 不应触发 crash"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -c 'VACUUM FULL toast_bug_array'"
    timeout_sec: 600
    expect:
      exit_code: 0
      not_contains: ["ERROR", "FATAL", "server closed the connection"]

  - name: "ANALYZE 不应触发 crash"
    kind: shell
    cmd: |
      su - gpadmin -c "psql -d gpadmin -c 'ANALYZE toast_bug_array'"
    timeout_sec: 600
    expect:
      exit_code: 0
      not_contains: ["ERROR", "FATAL", "server closed the connection"]

teardown:
  - DROP TABLE IF EXISTS toast_bug_array

created_by: chenqiang
created_at: "2026-05-24"
notes: |
  关联 issue：https://code.hashdata.xyz/field-engineering/dev_collaboration/-/issues/774

  **§4.1.2 + §13.7 跨 driver 状态 (revised 2026-05-24, user request)**：
  - VACUUM FULL / ANALYZE 是 non-tx-safe DDL → 必须 `kind: shell + psql -c`
  - CREATE TABLE + SET + INSERT 是 tx-safe → 用 `kind: sql` 走 psycopg
  - 跨 driver visibility: sql_driver 在每个 kind: sql step 末尾自动
    `await conn.commit()`，所以 step 2 的 INSERT 在 step 3 的独立 psql -c
    进程里可见。（M4a-2 第一版全 psql -c 是过度防御；这版按 user 蓝图
    把 INSERT 还原成 kind: sql，更接近飞书原文 psql -c 单线程模型。）

  规模：10M 元素 ARRAY ≈ 100MB+，INSERT 大约 10–60s。timeout 给 600s。
  可加速：`SET pax.min_size_of_external_toast = 524289;` 把 toast 阈值降到
  ~512KB，元素数可降到 ~100K 仍触发 TOAST 路径；保守保留 10M 做 1:1 复现。

  recover mode log_grep 留待 M5：默认 log_path 依赖 system_settings 配（Admin
  UI），M4a-2 阶段未配，暂不加 log_grep step。若以后 BUG 复现，需 log 旁证
  而非仅 psql exit code，再补 step。

  ---
  **Verified upstream-fixed (M4a-2 dogfood, 2026-05-24)**: POST /cases/try on
  synxdb-0001 (SynxDB-4.5.0-build130 / PG 14.4 / Cloudberry 2.1.0) → 全 main
  steps PASS. PR #74 (initial submit) + PR #75 (status flip). fixed_version
  above = verified-non-reproducing version, NOT necessarily the fix
  introduction commit (not yet researched against 飞书 history / source).
