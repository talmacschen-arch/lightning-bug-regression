name: agents-lint

# Gate for .claude/ agents + scripts (design.md §8.5 worktree-isolation
# lint + agent frontmatter sanity). continue-on-error forbidden.
#
# This workflow fires on the very PR that adds or edits it (because the
# workflow file itself is in the path filter), so we get end-to-end
# verification of the dispatch lint script in real CI from day one.

on:
  pull_request:
    paths:
      - '.claude/agents/**'
      - '.claude/scripts/**'
      - '.github/workflows/agents-lint.yml'
  push:
    branches: [main]
    paths:
      - '.claude/agents/**'
      - '.claude/scripts/**'
      - '.github/workflows/agents-lint.yml'

jobs:
  self-test:
    name: check_agent_dispatch.sh + agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: jq is preinstalled on ubuntu-latest — verify
        run: jq --version

      - name: lint pass — backend-fixer with isolation:worktree
        run: |
          echo '{"subagent_type":"backend-fixer","isolation":"worktree"}' \
            | .claude/scripts/check_agent_dispatch.sh

      - name: lint pass — reviewer needs no worktree
        run: |
          echo '{"subagent_type":"reviewer"}' \
            | .claude/scripts/check_agent_dispatch.sh

      - name: lint pass — empty array
        run: |
          echo '[]' | .claude/scripts/check_agent_dispatch.sh

      - name: lint fail — backend-fixer missing isolation (must exit 1)
        run: |
          set +e
          echo '{"subagent_type":"backend-fixer"}' \
            | .claude/scripts/check_agent_dispatch.sh
          rc=$?
          if [ "$rc" -ne 1 ]; then
            echo "expected exit 1, got $rc"
            exit 1
          fi

      - name: lint fail — array with one missing isolation (must exit 1)
        run: |
          set +e
          echo '[{"subagent_type":"backend-fixer","isolation":"worktree"},{"subagent_type":"frontend-fixer"}]' \
            | .claude/scripts/check_agent_dispatch.sh
          rc=$?
          if [ "$rc" -ne 1 ]; then
            echo "expected exit 1, got $rc"
            exit 1
          fi

      - name: lint fail — malformed JSON (must exit 2)
        run: |
          set +e
          echo 'not json' | .claude/scripts/check_agent_dispatch.sh
          rc=$?
          if [ "$rc" -ne 2 ]; then
            echo "expected exit 2, got $rc"
            exit 1
          fi

      - name: agent frontmatter sanity (name + description + model + tools)
        run: |
          set -euo pipefail
          fail=0
          for f in .claude/agents/*.md; do
            head -10 "$f" | grep -q '^name:'        || { echo "$f: missing name";        fail=1; }
            head -10 "$f" | grep -q '^description:' || { echo "$f: missing description"; fail=1; }
            head -10 "$f" | grep -q '^model:'       || { echo "$f: missing model";       fail=1; }
            head -10 "$f" | grep -q '^tools:'       || { echo "$f: missing tools";       fail=1; }
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "OK: $(ls .claude/agents/*.md | wc -l) agent files have name/description/model/tools"

      - name: every agent file declares one of the design.md §8.1 models
        run: |
          set -euo pipefail
          fail=0
          for f in .claude/agents/*.md; do
            model="$(awk '/^model:/{print $2; exit}' "$f")"
            case "$model" in
              opus|sonnet|haiku) ;;
              *) echo "$f: model=$model is not one of opus|sonnet|haiku"; fail=1 ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

      - name: lint script is executable
        run: test -x .claude/scripts/check_agent_dispatch.sh
