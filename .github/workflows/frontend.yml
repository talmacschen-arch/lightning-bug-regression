name: frontend

# Gate (design.md §6.4 / §14.1 R3): tsc --noEmit + eslint + vitest are
# required; Playwright e2e is a separate gate job.
# continue-on-error is forbidden anywhere in this file.
#
# Path filter avoids false-red on PRs that touch only backend / docs /
# agents. When frontend/ has no real code yet (M0), this workflow does
# not run — the first M3a frontend PR will be its first real exercise.

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    name: tsc + eslint + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: eslint
        run: npm run lint

      - name: vitest
        run: npm test -- --run

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
