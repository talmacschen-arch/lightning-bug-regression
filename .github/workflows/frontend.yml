name: frontend

# Gate (design.md §6.4 / §14.1 R3): tsc --noEmit + eslint + vitest +
# Playwright e2e are required. continue-on-error is forbidden.
#
# Two-job init-guard pattern (same shape as backend.yml): check-init
# detects frontend/package.json. When absent (M0 placeholder period),
# the build and e2e jobs are skipped — the run shows as success and
# auto-merge proceeds. First M3a frontend PR adds package.json and the
# same workflow starts gating real code.

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  check-init:
    name: detect frontend initialization
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f frontend/package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "frontend/package.json present — running full build + e2e jobs"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/package.json not found — build/e2e jobs will be skipped (M0 placeholder period; first M3a frontend PR will populate this)"
          fi

  build:
    name: tsc + eslint + vitest
    needs: check-init
    if: needs.check-init.outputs.ready == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: eslint
        run: npm run lint

      - name: vitest
        run: npm test -- --run

  e2e:
    name: playwright e2e
    needs: [check-init, build]
    if: needs.check-init.outputs.ready == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
