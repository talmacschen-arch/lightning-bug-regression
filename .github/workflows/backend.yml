name: backend

# Gate (design.md §6.4 / §14.1 R3): pytest + ruff are required.
# continue-on-error is forbidden anywhere in this file.
#
# Two-job init-guard pattern:
#   check-init: lightweight detector. If backend/pyproject.toml is absent
#     (M0 placeholder period before first backend code lands), emits a
#     GH-Actions notice and sets ready=false.
#   test: runs only when ready=true. When skipped, the run shows as
#     success (skipped jobs are not failures), so auto-merge proceeds.
#     Once backend/pyproject.toml lands in M1, the same workflow tests
#     it automatically — no workflow change required.

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  check-init:
    name: detect backend initialization
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f backend/pyproject.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "backend/pyproject.toml present — running full test job"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::backend/pyproject.toml not found — test job will be skipped (M0 placeholder period; first M1 backend PR will populate this)"
          fi

  test:
    name: pytest + ruff
    needs: check-init
    if: needs.check-init.outputs.ready == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: pytest
        run: pytest -q
